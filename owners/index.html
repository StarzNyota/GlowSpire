<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎀 GlowSpire Owners Portal</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="login-container">

    <h1>🎀 GlowSpire</h1>

    <h2>Owners Portal</h2>

    <p class="subtitle">
        Three leaders. One vision. ✨
    </p>


    <!-- Founder Login -->

    <div class="card">

        <h3>👑 Founder Portal</h3>

        <p>
            Nyota • Founder • Co-Owner • Co-CEO
        </p>

        <input 
        id="founderPassword"
        type="password"
        placeholder="Enter Founder Password">


        <button onclick="founderLogin()">
            Enter Founder Portal
        </button>

    </div>



    <!-- Co-Owner Login -->

    <div class="card">

        <h3>🌸 Co-Owner Portal</h3>

        <p>
            Nova & Sophie • Co-Owners • Co-CEOs
        </p>

        <input 
        id="ownerPassword"
        type="password"
        placeholder="Enter Co-Owner Password">


        <button onclick="ownerLogin()">
            Enter Co-Owner Portal
        </button>

    </div>



    <!-- Worker -->

    <div class="card worker">

        <h3>💖 Worker Portal</h3>

        <p>
            🚧 Coming Soon DIVAS when we earn money ✨
        </p>

    </div>


</div>


<script src="script.js"></script>

</body>

</html>
